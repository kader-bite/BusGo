<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BusGo — Tunisia Bus Schedule</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Bus<span>Go</span></h1>
  <div class="theme-toggle">
    <span class="toggle-icon" id="themeIcon">🌙</span>
    <button class="toggle-btn" id="themeToggle" aria-label="Toggle theme"></button>
  </div>
</header>

<main>

  <!-- SEARCH PANEL -->
  <section class="search-panel">
    <div class="panel-title">Plan your journey</div>

    <div class="search-bar">

      <!-- FROM -->
      <div class="search-field">
        <span class="field-label">From</span>
        <div class="input-group autocomplete-wrap">
          <span class="pin-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2C8.686 2 6 4.686 6 8c0 4.418 6 12 6 12s6-7.582 6-12c0-3.314-2.686-6-6-6z"/>
              <circle cx="12" cy="8" r="2" fill="var(--ink)"/>
            </svg>
          </span>
          <input type="text" id="from" class="city-input" placeholder="Departure city" autocomplete="off" />
          <ul class="suggestions-list" id="from-suggestions"></ul>
        </div>
      </div>

      <!-- SWAP -->
      <button class="switch-btn" id="switchBtn" title="Swap cities" aria-label="Swap departure and arrival">
        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="var(--bright)"><path d="M280-160 80-360l200-200 56 57-103 103h287v80H233l103 103-56 57Zm400-240-56-57 103-103H440v-80h287L624-743l56-57 200 200-200 200Z"/></svg>
      </button>

      <!-- TO -->
      <div class="search-field">
        <span class="field-label">To</span>
        <div class="input-group autocomplete-wrap">
          <span class="pin-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2C8.686 2 6 4.686 6 8c0 4.418 6 12 6 12s6-7.582 6-12c0-3.314-2.686-6-6-6z"/>
              <circle cx="12" cy="8" r="2" fill="var(--ink)"/>
            </svg>
          </span>
          <input type="text" id="to" class="city-input" placeholder="Arrival city" autocomplete="off" />
          <ul class="suggestions-list" id="to-suggestions"></ul>
        </div>
      </div>

      <div class="bar-divider"></div>

      <!-- PASSENGERS -->
      <div class="search-field pax-dropdown-wrap">
        <span class="field-label">Passengers</span>
        <div class="pax-trigger" id="paxTrigger">
          <span class="pax-lead-icon">
            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="var(--bright)"><path d="M40-160v-112q0-34 17.5-62.5T104-378q62-31 126-46.5T360-440q66 0 130 15.5T616-378q29 15 46.5 43.5T680-272v112H40Zm720 0v-120q0-44-24.5-84.5T666-434q51 6 96 20.5t84 35.5q36 20 55 44.5t19 53.5v120H760ZM247-527q-47-47-47-113t47-113q47-47 113-47t113 47q47 47 47 113t-47 113q-47 47-113 47t-113-47Zm466 0q-47 47-113 47-11 0-28-2.5t-28-5.5q27-32 41.5-71t14.5-81q0-42-14.5-81T544-792q14-5 28-6.5t28-1.5q66 0 113 47t47 113q0 66-47 113ZM120-240h480v-32q0-11-5.5-20T580-306q-54-27-109-40.5T360-360q-56 0-111 13.5T140-306q-9 5-14.5 14t-5.5 20v32Zm296.5-343.5Q440-607 440-640t-23.5-56.5Q393-720 360-720t-56.5 23.5Q280-673 280-640t23.5 56.5Q327-560 360-560t56.5-23.5ZM360-240Zm0-400Z"/></svg>
          </span>
          <span id="paxSummary">1 Adult</span>
          <span class="trigger-arrow">▼</span>
        </div>
        <div class="pax-panel" id="paxPanel">
          <div class="pax-row">
            <div class="pax-info">
              <span class="pax-icon">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="var(--bright)"><path d="M367-527q-47-47-47-113t47-113q47-47 113-47t113 47q47 47 47 113t-47 113q-47 47-113 47t-113-47ZM160-160v-112q0-34 17.5-62.5T224-378q62-31 126-46.5T480-440q66 0 130 15.5T736-378q29 15 46.5 43.5T800-272v112H160Zm80-80h480v-32q0-11-5.5-20T700-306q-54-27-109-40.5T480-360q-56 0-111 13.5T260-306q-9 5-14.5 14t-5.5 20v32Zm296.5-343.5Q560-607 560-640t-23.5-56.5Q513-720 480-720t-56.5 23.5Q400-673 400-640t23.5 56.5Q447-560 480-560t56.5-23.5ZM480-640Zm0 400Z"/></svg>
              </span>
              <div>
                <div class="pax-name">Adult</div>
                <div class="pax-note">12+ years</div>
              </div>
            </div>
            <div class="pax-counter">
              <button onclick="updatePax('adult',-1)" id="adult-minus">−</button>
              <span class="pax-count" id="adult-count">1</span>
              <button onclick="updatePax('adult',1)">+</button>
            </div>
          </div>
          <div class="pax-row">
            <div class="pax-info">
              <span class="pax-icon">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="var(--bright)"><path d="M544.5-504.5Q530-519 530-540t14.5-35.5Q559-590 580-590t35.5 14.5Q630-561 630-540t-14.5 35.5Q601-490 580-490t-35.5-14.5Zm-200 0Q330-519 330-540t14.5-35.5Q359-590 380-590t35.5 14.5Q430-561 430-540t-14.5 35.5Q401-490 380-490t-35.5-14.5Zm27 191.5Q323-346 300-400h360q-23 54-71.5 87T480-280q-60 0-108.5-33Zm-32 164.5q-65.5-28.5-114-77t-77-114Q120-405 120-480t28.5-140.5q28.5-65.5 77-114t114-77Q405-840 480-840t140.5 28.5q65.5 28.5 114 77t77 114Q840-555 840-480t-28.5 140.5q-28.5 65.5-77 114t-114 77Q555-120 480-120t-140.5-28.5ZM678-282q82-82 82-198t-82-198q-82-82-198-82h-12q-6 0-12 2-6 6-8 13t-2 15q0 21 14.5 35.5T496-680q9 0 16.5-3t15.5-3q12 0 20 9t8 21q0 23-21.5 29.5T496-620q-45 0-77.5-32.5T386-730v-6q0-3 1-8-83 30-135 101t-52 163q0 116 82 198t198 82q116 0 198-82ZM480-480Z"/></svg>
              </span>
              <div>
                <div class="pax-name">Child</div>
                <div class="pax-note">2–11 years · 50% off</div>
              </div>
            </div>
            <div class="pax-counter">
              <button onclick="updatePax('kid',-1)" id="kid-minus">−</button>
              <span class="pax-count" id="kid-count">0</span>
              <button onclick="updatePax('kid',1)">+</button>
            </div>
          </div>
          <div class="pax-row">
            <div class="pax-info">
              <span class="pax-icon">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="var(--bright)"><path d="M423.5-743.5Q400-767 400-800t23.5-56.5Q447-880 480-880t56.5 23.5Q560-833 560-800t-23.5 56.5Q513-720 480-720t-56.5-23.5ZM680-80v-200H480q-33 0-56.5-23.5T400-360v-240q0-33 23.5-56.5T480-680q24 0 41.5 10.5T559-636q55 66 99.5 90.5T760-520v80q-53 0-107-23t-93-55v138h120q33 0 56.5 23.5T760-300v220h-80Zm-280 0q-83 0-141.5-58.5T200-280q0-72 45.5-127T360-476v82q-35 14-57.5 44.5T280-280q0 50 35 85t85 35q39 0 69.5-22.5T514-240h82q-14 69-69 114.5T400-80Z"/></svg>
              </span>
              <div>
                <div class="pax-name">Disabled</div>
                <div class="pax-note">Reduced fare · 50% off</div>
              </div>
            </div>
            <div class="pax-counter">
              <button onclick="updatePax('disabled',-1)" id="disabled-minus">−</button>
              <span class="pax-count" id="disabled-count">0</span>
              <button onclick="updatePax('disabled',1)">+</button>
            </div>
          </div>
        </div>
      </div>

      <div class="bar-divider"></div>

      <!-- DATE -->
      <div class="search-field date-field">
        <span class="field-label">Date</span>
        <div class="input-group">
          <input type="date" id="travel-date" />
        </div>
      </div>

      <!-- SEARCH BUTTON -->
      <button class="search-btn" id="searchBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg" width="18" height="18">
          <circle cx="11" cy="11" r="7"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <span class="btn-label">Search</span>
      </button>

    </div>
  </section>

  <!-- RESULTS -->
  <section id="results">
    <div class="empty-state">
      <span class="emoji">
        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="var(--bright)"><path d="m600-120-240-84-186 72q-20 8-37-4.5T120-170v-560q0-13 7.5-23t20.5-15l212-72 240 84 186-72q20-8 37 4.5t17 33.5v560q0 13-7.5 23T812-192l-212 72Zm-40-98v-468l-160-56v468l160 56Zm80 0 120-40v-474l-120 46v468Zm-440-10 120-46v-468l-120 40v474Zm440-458v468-468Zm-320-56v468-468Z"/></svg>
      </span>
      <p>Enter your route above and hit <strong>Search</strong></p>
    </div>
  </section>

</main>

<script src="app.js"></script>
</body>
</html>
